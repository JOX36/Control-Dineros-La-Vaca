<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Vaca Original — Control de Caja</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a0f00;
  --bg2:#2a1a00;
  --surface:#2d1f05;
  --surface2:#3a2810;
  --surface3:#4a3520;
  --border:#5a4020;
  --border2:#7a5530;
  --accent:#f5a623;
  --accent2:#e8850a;
  --cream:#fdf0d5;
  --brown:#5c3d11;
  --green:#4caf7d;
  --red:#e05c5c;
  --blue:#5b9bd5;
  --gold:#f5c842;
  --white:#fff8ee;
  --text:#fdf0d5;
  --text2:#c8a87a;
  --text3:#7a5535;
  --font:'Nunito',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 44px),
  repeating-linear-gradient(rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 44px);}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:8888;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,#3d2200 0%,#1a0f00 70%);}
#login-screen.hidden{display:none;}
.login-wrap{width:94%;max-width:360px;display:flex;flex-direction:column;align-items:center;}
.login-logo{width:160px;height:160px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 4px 20px rgba(245,166,35,.3));animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.login-sub{font-size:.78rem;color:var(--text3);margin-bottom:24px;font-family:var(--mono);letter-spacing:.08em;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:26px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(245,166,35,.1);}
.lf{margin-bottom:13px;}
.lf label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;display:block;font-weight:700;}
.lf input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:.88rem;padding:10px 12px;}
.lf input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,.15);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0f00;border:none;border-radius:10px;
  padding:13px;font-family:var(--font);font-weight:900;font-size:1rem;cursor:pointer;margin-top:4px;
  box-shadow:0 4px 15px rgba(245,166,35,.4);letter-spacing:.03em;}
.btn-login:hover{opacity:.9;}
#l-error{font-size:.75rem;color:var(--red);min-height:18px;margin-top:8px;text-align:center;font-family:var(--mono);}

/* HEADER */
header{position:sticky;top:0;z-index:500;
  background:linear-gradient(135deg,#2d1f05,#1a0f00);
  border-bottom:1px solid var(--border);
  padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 20px rgba(0,0,0,.4);}
.h-left{display:flex;align-items:center;gap:8px;}
.h-logo{width:36px;height:36px;object-fit:contain;border-radius:50%;}
.h-name{font-weight:900;font-size:.92rem;color:var(--accent);}
.h-sub{font-size:.6rem;color:var(--text3);}
.h-right{display:flex;align-items:center;gap:8px;}
.h-user{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.h-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;}
.h-av.admin{background:rgba(245,166,35,.25);color:var(--accent);}
.h-av.invitado{background:rgba(91,155,213,.2);color:var(--blue);}
.h-uname{font-size:.72rem;color:var(--text2);font-family:var(--mono);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.syncing{background:var(--gold);animation:pulse .7s infinite alternate;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
@keyframes pulse{to{opacity:.2;}}
.btn-sm{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:4px 9px;font-size:.68rem;cursor:pointer;font-family:var(--font);font-weight:700;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}

/* NAV BAR */
.nav-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px;}
.mnav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.mnav-btn:hover{border-color:var(--accent);}
#monthLabel{font-family:var(--mono);font-size:.82rem;color:var(--accent);min-width:108px;text-align:center;font-weight:700;}
.punto-wrap{position:relative;flex:1;min-width:120px;}
.punto-btn{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);
  font-family:var(--font);font-size:.82rem;font-weight:700;padding:7px 12px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:4px;}
.punto-btn:hover{border-color:var(--accent);}
.punto-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:300;
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;}
.punto-dd.open{display:block;}
.punto-opt{padding:12px 14px;font-size:.84rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.punto-opt:last-child{border-bottom:none;}
.punto-opt:hover,.punto-opt.sel{background:var(--surface2);}
.punto-opt.sel{color:var(--accent);}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mnav-today{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;
  padding:5px 10px;font-size:.7rem;cursor:pointer;font-family:var(--font);font-weight:700;flex-shrink:0;}
.mnav-today:hover{border-color:var(--accent);color:var(--accent);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:linear-gradient(to top,#1a0f00,#2d1f05);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;height:60px;padding:0 8px;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  color:var(--text3);cursor:pointer;font-family:var(--font);font-size:.6rem;font-weight:700;
  padding:6px 12px;border-radius:10px;flex:1;transition:all .15s;}
.bnav-btn .icon{font-size:1.25rem;}
.bnav-btn.active{color:var(--accent);background:rgba(245,166,35,.1);}

/* MAIN */
main{padding:14px 14px 80px;max-width:700px;margin:0 auto;position:relative;z-index:1;}
.screen{display:none;}
.screen.active{display:block;}
.ro-banner{background:rgba(91,155,213,.08);border:1px solid rgba(91,155,213,.25);border-radius:10px;
  padding:9px 13px;margin-bottom:12px;font-size:.76rem;color:var(--blue);display:none;font-weight:600;}
.ro-banner.show{display:block;}

/* PUNTO HEADER */
.punto-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;}
.punto-hd-name{font-size:1.1rem;font-weight:900;}
.punto-hd-sub{font-size:.7rem;color:var(--text3);font-family:var(--mono);}
.mes-total{font-family:var(--mono);font-size:.95rem;color:var(--green);font-weight:700;}

/* DIA LIST */
.dia-list{display:flex;flex-direction:column;gap:10px;}

/* CUADRE BANNER */
.cuadre-banner{
  background:linear-gradient(135deg,rgba(76,175,125,.15),rgba(76,175,125,.05));
  border:1px solid rgba(76,175,125,.4);
  border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:relative;overflow:hidden;
}
.cuadre-banner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green);}
.cuadre-left{padding-left:8px;}
.cuadre-icon{font-size:1.3rem;margin-bottom:2px;}
.cuadre-title{font-size:.82rem;font-weight:900;color:var(--green);}
.cuadre-meta{font-size:.7rem;color:var(--text3);font-family:var(--mono);}
.cuadre-range{font-size:.72rem;color:var(--text2);margin-top:3px;font-weight:600;}
.cuadre-amount{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--green);text-align:right;flex-shrink:0;}
.cuadre-amount-lbl{font-size:.62rem;color:var(--text3);text-align:right;}
.btn-del-cuadre{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.78rem;flex-shrink:0;padding:4px;}
.btn-del-cuadre:hover{color:var(--red);}

/* DIA CARD */
.dia-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.dia-card.has-data{border-color:var(--border2);}
.dia-card.today-card{border-color:var(--accent);box-shadow:0 0 0 1px rgba(245,166,35,.2);}
.dia-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--surface2);cursor:pointer;user-select:none;}
.dia-hd-left{display:flex;align-items:center;gap:10px;}
.dia-num{font-family:var(--mono);font-size:1.15rem;font-weight:700;color:var(--accent);}
.dia-wd{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
.dia-hd-right{display:flex;align-items:center;gap:8px;}
.dia-total{font-family:var(--mono);font-size:.82rem;color:var(--green);font-weight:700;}
.dia-chev{font-size:.7rem;color:var(--text3);transition:transform .2s;}
.dia-chev.open{transform:rotate(180deg);}
.dia-body{display:none;padding:12px 14px;border-top:1px solid var(--border);}
.dia-body.open{display:block;}

/* TURNOS */
.turno-sec{margin-bottom:14px;}
.turno-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.turno-lbl{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;display:inline-block;}
.turno-lbl.am{background:rgba(245,200,66,.15);color:var(--gold);}
.turno-lbl.pm{background:rgba(91,155,213,.15);color:var(--blue);}
.turno-tot{font-family:var(--mono);font-size:.78rem;color:var(--green);font-weight:700;}
.elist{display:flex;flex-direction:column;gap:6px;margin-bottom:7px;}
.e-item{background:var(--surface3);border:1px solid var(--border);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.e-hora{font-family:var(--mono);font-size:.7rem;color:var(--text3);flex-shrink:0;min-width:38px;}
.e-monto{font-family:var(--mono);font-size:.9rem;color:var(--green);font-weight:700;flex-shrink:0;}
.e-recep{font-size:.75rem;color:var(--text2);flex:1;font-weight:600;}
.btn-del-e{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;flex-shrink:0;}
.btn-del-e:hover{color:var(--red);}
.nef{background:var(--surface2);border:1px dashed var(--border2);border-radius:10px;padding:10px;display:none;flex-direction:column;gap:7px;}
.nef.open{display:flex;}
.nef-row{display:flex;gap:6px;}
.nef-inp{background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:.8rem;padding:7px 8px;flex:1;min-width:0;}
.nef-inp:focus{outline:none;border-color:var(--accent);}
.nef-inp.sm{flex:0 0 70px;}
.btn-add-e{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0f00;border:none;border-radius:7px;padding:8px 14px;font-family:var(--font);font-weight:800;font-size:.78rem;cursor:pointer;}
.btn-tog-nef{background:none;border:1px dashed var(--border2);color:var(--text3);border-radius:7px;padding:5px 12px;font-size:.72rem;cursor:pointer;font-family:var(--font);font-weight:700;}
.btn-tog-nef:hover{border-color:var(--accent);color:var(--accent);}

/* CUADRE FORM en dia */
.cuadre-form-wrap{margin-top:8px;border-top:1px solid var(--border);padding-top:10px;}
.cuadre-form-inner{background:rgba(76,175,125,.06);border:1px dashed rgba(76,175,125,.3);border-radius:10px;padding:10px;display:none;flex-direction:column;gap:7px;}
.cuadre-form-inner.open{display:flex;}
.btn-cuadre{background:none;border:1px solid rgba(76,175,125,.4);color:var(--green);border-radius:7px;
  padding:6px 14px;font-size:.74rem;cursor:pointer;font-family:var(--font);font-weight:800;width:100%;margin-top:4px;}
.btn-cuadre:hover{background:rgba(76,175,125,.1);}
.btn-hacer-cuadre{background:linear-gradient(135deg,#4caf7d,#2d8a5a);color:#fff;border:none;border-radius:7px;
  padding:9px;font-family:var(--font);font-weight:800;font-size:.82rem;cursor:pointer;width:100%;}

/* NOTAS */
.notas-sec{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.notas-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:700;}
.notas-ta{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:.78rem;padding:7px 8px;resize:vertical;min-height:46px;font-weight:600;}
.notas-ta:focus{outline:none;border-color:var(--accent);}
.si{font-size:.62rem;color:var(--text3);min-height:16px;font-family:var(--mono);margin-top:3px;}
.si.saving{color:var(--gold);}
.si.saved{color:var(--green);}
.si.err{color:var(--red);}

/* GASTOS */
.sec-hd{font-family:var(--font);font-size:.78rem;font-weight:900;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border);}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;display:flex;flex-direction:column;gap:9px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg-row{display:flex;gap:8px;}
.fg-row .fg{flex:1;}
.fg-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
.fg-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.84rem;padding:8px 9px;width:100%;font-weight:600;}
.fg-input:focus{outline:none;border-color:var(--accent);}
.img-prev-wrap{display:none;margin-top:5px;}
.img-prev-wrap img{max-width:100%;max-height:130px;border-radius:8px;border:1px solid var(--border);object-fit:contain;}
.camera-btns{display:flex;gap:8px;}
.btn-cam{flex:1;border:none;border-radius:8px;padding:9px;font-family:var(--font);font-weight:800;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-cam.foto{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0f00;}
.btn-cam.galeria{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-full{border:none;border-radius:10px;padding:11px;font-family:var(--font);font-weight:900;font-size:.88rem;cursor:pointer;width:100%;}
.btn-full.red{background:linear-gradient(135deg,#e05c5c,#c04040);color:#fff;box-shadow:0 4px 12px rgba(224,92,92,.3);}
.btn-full.teal{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0f00;box-shadow:0 4px 12px rgba(245,166,35,.3);}
.btn-full:hover{opacity:.88;}
.items-list{display:flex;flex-direction:column;gap:8px;}
.item-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:9px 12px;display:flex;align-items:flex-start;gap:10px;}
.item-card.uc{border-left-color:var(--accent);}
.ic-thumb{width:44px;height:44px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:zoom-in;flex-shrink:0;}
.ic-icon{width:44px;height:44px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.ic-info{flex:1;}
.ic-title{font-size:.84rem;color:var(--text);font-weight:700;}
.ic-meta{font-size:.7rem;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.ic-amt{font-family:var(--mono);font-size:.88rem;color:var(--red);font-weight:700;flex-shrink:0;}
.rbadge{font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:5px;text-transform:uppercase;flex-shrink:0;}
.rbadge.admin{background:rgba(245,166,35,.15);color:var(--accent);}
.rbadge.invitado{background:rgba(91,155,213,.15);color:var(--blue);}
.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.82rem;flex-shrink:0;padding:2px 4px;}
.btn-del:hover{color:var(--red);}
.btn-tog{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 8px;font-size:.65rem;cursor:pointer;font-weight:700;}
.empty-msg{font-size:.8rem;color:var(--text3);padding:10px 0;font-family:var(--mono);}

/* RESUMEN */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;}
.sc-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:700;}
.sc-val{font-family:var(--mono);font-size:1.25rem;font-weight:700;}
.sc-val.green{color:var(--green);}
.sc-val.red{color:var(--red);}
.sc-val.gold{color:var(--gold);}
.sc-val.amber{color:var(--accent);}
.res-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;overflow-x:auto;}
.res-table{width:100%;border-collapse:collapse;}
.res-table th{background:var(--surface2);padding:9px 12px;font-size:.65rem;color:var(--text2);text-align:left;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:var(--mono);font-weight:700;}
.res-table td{padding:8px 12px;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.02);font-family:var(--mono);font-weight:600;}
.res-table tr:last-child td{border-bottom:none;}
.res-table td:first-child{font-family:var(--font);color:var(--text2);font-weight:700;}
.pos{color:var(--green);}.neg{color:var(--red);}
.res-table tr.tr-row td{background:var(--surface2);color:var(--gold);font-weight:700;}
.res-table tr.nr-row td{background:var(--surface3);font-weight:700;}
.ciclos-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.ciclo-card{background:var(--surface);border:1px solid rgba(76,175,125,.3);border-left:4px solid var(--green);border-radius:10px;padding:11px 14px;}
.ciclo-num{font-size:.65rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-bottom:3px;}
.ciclo-range{font-size:.82rem;color:var(--text);font-weight:700;}
.ciclo-meta{font-size:.72rem;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.ciclo-total{font-family:var(--mono);font-size:.95rem;color:var(--green);font-weight:700;float:right;margin-top:-28px;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.mhc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.mhc-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2);cursor:pointer;}
.mhc-m{font-family:var(--mono);font-size:.8rem;color:var(--accent);font-weight:700;}
.mhc-t{font-family:var(--mono);font-size:.8rem;color:var(--green);font-weight:700;}
.mhc-body{display:none;padding:10px 14px;}
.mhc-body.open{display:block;}
.btn-export{background:var(--surface2);border:1px solid var(--border2);color:var(--gold);border-radius:9px;
  padding:9px 14px;font-family:var(--font);font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:14px;width:100%;}

/* LOADER / MODAL */
.loader{display:flex;justify-content:center;padding:30px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:9990;}
.modal-ov.open{display:flex;}
.modal-ov img{max-width:90vw;max-height:88vh;border-radius:10px;}
.modal-close{position:absolute;top:16px;right:20px;color:#fff;font-size:1.7rem;cursor:pointer;background:none;border:none;opacity:.7;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>

const PCOLORS=['#f5a623','#4a9eff','#4caf7d','#e05c5c','#c084fc','#ff9a3c','#f5c842'];
const SB_URL='https://wizyrznotpxgvnzcilwk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpenlyem5vdHB4Z3ZuemNpbHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNzQxNzUsImV4cCI6MjA5Mzk1MDE3NX0.BcWA0U3soLnKdSp9oqRQ7uBpe8WrVKs0WiqFdvBptng';

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function initSB(){try{sbClient=supabase.createClient(SB_URL,SB_KEY);return true;}catch(e){return false;}}

async function doLogin(){
  const user=document.getElementById('l-user').value.trim().toLowerCase();
  const pass=document.getElementById('l-pass').value;
  const errEl=document.getElementById('l-error');
  if(!user||!pass){errEl.textContent='Ingresa usuario y contrasena.';return;}
  errEl.textContent='Verificando...';
  const hash=await sha256(pass);
  const {data,error}=await sbClient.from('app_usuarios').select('*').eq('username',user).eq('password',hash).eq('activo',true).maybeSingle();
  if(error||!data){errEl.textContent='Usuario o contrasena incorrectos.';return;}
  sesion={username:data.username,rol:data.rol,nombre:data.nombre||data.username};
  localStorage.setItem('sesion',JSON.stringify(sesion));
  document.getElementById('login-screen').classList.add('hidden');
  initApp();
}
function doLogout(){
  sesion=null;localStorage.removeItem('sesion');
  document.getElementById('h-user').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('l-pass').value='';document.getElementById('l-error').textContent='';
}
const isAdmin=()=>sesion&&sesion.rol==='admin';
function setSyncing(){document.getElementById('sync-dot').className='sync-dot syncing';}
function setSyncOk(){document.getElementById('sync-dot').className='sync-dot ok';}
function setSyncErr(){document.getElementById('sync-dot').className='sync-dot err';}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}updateML();renderCaja();}
function goToday(){curYear=HOY.getFullYear();curMonth=HOY.getMonth();updateML();renderCaja();}
function updateML(){document.getElementById('monthLabel').textContent=MESES[curMonth].slice(0,3)+' '+curYear;}
function dateStr(d){return curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function getDays(){return new Date(curYear,curMonth+1,0).getDate();}
function nowTime(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmt(n){return(n||0).toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2});}

function buildPuntoDd(){
  const dd=document.getElementById('punto-dd');dd.innerHTML='';
  PUNTOS.forEach(function(p,i){
    const div=document.createElement('div');
    div.className='punto-opt'+(i===curPunto?' sel':'');
    div.innerHTML='<div class="pdot" style="background:'+PCOLORS[i]+'"></div>'+p;
    div.onclick=function(){curPunto=i;document.getElementById('punto-sel').textContent=p;dd.classList.remove('open');renderCaja();};
    dd.appendChild(div);
  });
}
function togPuntoMenu(){buildPuntoDd();document.getElementById('punto-dd').classList.toggle('open');}
document.addEventListener('click',function(e){
  const pw=document.getElementById('punto-wrap');

function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('bnav-'+name).classList.add('active');
  if(name==='gastos')renderGastos();
  else if(name==='resumen')renderResumen();
  else if(name==='usuarios')renderUsuarios();
  else renderCaja();

async function renderCaja(){
  const list=document.getElementById('dia-list');
  list.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  document.getElementById('ph-name').textContent=PUNTOS[curPunto];
  document.getElementById('ph-name').style.color=PCOLORS[curPunto];
  document.getElementById('ph-sub').textContent=MESES[curMonth]+' '+curYear;
  const s=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-01';
  const e=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-31';
  const punto=PUNTOS[curPunto];
  const [r1,r2,r3]=await Promise.all([
    sbClient.from('caja_registros').select('*').eq('punto',punto).gte('fecha',s).lte('fecha',e),
    sbClient.from('caja_entregas').select('*').eq('punto',punto).gte('fecha',s).lte('fecha',e).order('created_at'),
    sbClient.from('caja_cuadres').select('*').eq('punto',punto).gte('fecha',s).lte('fecha',e).order('fecha')
  ]);
  const regMap={};(r1.data||[]).forEach(function(r){regMap[r.fecha]=r;});
  const entMap={};
  (r2.data||[]).forEach(function(en){
    if(!entMap[en.fecha])entMap[en.fecha]={am:[],pm:[]};
    entMap[en.fecha][en.turno].push(en);
  });
  const cuadreMap={};(r3.data||[]).forEach(function(c){cuadreMap[c.fecha]=c;});
  const mesTotal=(r2.data||[]).reduce(function(s,en){return s+(en.monto||0);},0);
  document.getElementById('ph-total').textContent=mesTotal>0?fmt(mesTotal):'--';
  const days=getDays();const ro=!isAdmin();
  list.innerHTML='';

  // calcular ciclos para mostrar acumulado entre cuadres
  const cuadresFecha=Object.keys(cuadreMap).sort();
  let lastCuadre=null;

  for(let d=1;d<=days;d++){
    const ds=dateStr(d);
    const wd=DIAS[new Date(curYear,curMonth,d).getDay()];
    const reg=regMap[ds]||{};
    const ents=entMap[ds]||{am:[],pm:[]};
    const dayTot=[].concat(ents.am,ents.pm).reduce(function(s,en){return s+(en.monto||0);},0);
    const isToday=d===HOY.getDate()&&curMonth===HOY.getMonth()&&curYear===HOY.getFullYear();
    const cuadre=cuadreMap[ds];

    // DIA CARD
    const card=document.createElement('div');
    card.className='dia-card'+(dayTot>0||reg.notas?' has-data':'')+(isToday?' today-card':'');
    card.id='dia-'+d;
    const amTot=ents.am.reduce(function(s,en){return s+(en.monto||0);},0);
    const pmTot=ents.pm.reduce(function(s,en){return s+(en.monto||0);},0);
    const nEnts=ents.am.length+ents.pm.length;

    let html='<div class="dia-hd" onclick="togDia('+d+')" style="'+(isToday?'border-left:3px solid var(--accent);':'')+'">'+
      '<div class="dia-hd-left">'+
      '<div><div class="dia-num" style="'+(isToday?'color:var(--gold)':'')+'">'+d+'</div><div class="dia-wd">'+wd+'</div></div>'+
      (nEnts>0?'<div style="font-size:.7rem;color:var(--text3);font-weight:700">'+nEnts+' entrega'+(nEnts!==1?'s':'')+'</div>':'')+
      '</div>'+
      '<div class="dia-hd-right"><div class="dia-total">'+(dayTot>0?fmt(dayTot):'--')+'</div>'+
      '<div class="dia-chev" id="chev-'+d+'">&#9660;</div></div></div>'+
      '<div class="dia-body" id="diab-'+d+'">';

    // AM
    html+='<div class="turno-sec"><div class="turno-top"><span class="turno-lbl am">&#127749; Manana</span>'+(amTot>0?'<span class="turno-tot">'+fmt(amTot)+'</span>':'')+
      '</div><div class="elist" id="elist-'+d+'-am">';
    ents.am.forEach(function(en){
      html+='<div class="e-item"><span class="e-hora">'+(en.hora||'--:--')+'</span><span class="e-monto">'+fmt(en.monto)+'</span><span class="e-recep">'+(en.receptor||'')+'</span>'+
        (ro?'':'<button class="btn-del-e" onclick="delEntrega('+en.id+','+d+','am')">&#x2715;</button>')+'</div>';
    });
    html+='</div>';
    if(!ro)html+='<div class="nef" id="nef-'+d+'-am"><div class="nef-row">'+
      '<input class="nef-inp sm" type="time" id="nef-h-'+d+'-am" value="'+nowTime()+'">'+
      '<input class="nef-inp" type="number" placeholder="Monto" id="nef-m-'+d+'-am" min="0" step="0.01"></div>'+
      '<input class="nef-inp" type="text" placeholder="Recibido por" id="nef-r-'+d+'-am">'+
      '<button class="btn-add-e" onclick="addEntrega('+d+','am')">+ Agregar</button></div>'+
      '<button class="btn-tog-nef" onclick="togNef('+d+','am')">+ Nueva entrega AM</button>';
    html+='</div>';

    // PM
    html+='<div class="turno-sec"><div class="turno-top"><span class="turno-lbl pm">&#127750; Tarde</span>'+(pmTot>0?'<span class="turno-tot">'+fmt(pmTot)+'</span>':'')+
      '</div><div class="elist" id="elist-'+d+'-pm">';
    ents.pm.forEach(function(en){
      html+='<div class="e-item"><span class="e-hora">'+(en.hora||'--:--')+'</span><span class="e-monto">'+fmt(en.monto)+'</span><span class="e-recep">'+(en.receptor||'')+'</span>'+
        (ro?'':'<button class="btn-del-e" onclick="delEntrega('+en.id+','+d+','pm')">&#x2715;</button>')+'</div>';
    });
    html+='</div>';
    if(!ro)html+='<div class="nef" id="nef-'+d+'-pm"><div class="nef-row">'+
      '<input class="nef-inp sm" type="time" id="nef-h-'+d+'-pm" value="'+nowTime()+'">'+
      '<input class="nef-inp" type="number" placeholder="Monto" id="nef-m-'+d+'-pm" min="0" step="0.01"></div>'+
      '<input class="nef-inp" type="text" placeholder="Recibido por" id="nef-r-'+d+'-pm">'+
      '<button class="btn-add-e" onclick="addEntrega('+d+','pm')">+ Agregar</button></div>'+
      '<button class="btn-tog-nef" onclick="togNef('+d+','pm')">+ Nueva entrega PM</button>';
    html+='</div>';

    // NOTAS
    html+='<div class="notas-sec"><div class="notas-lbl">&#x1F4DD; Notas del dia</div>'+
      '<textarea class="notas-ta" id="notas-'+d+'" placeholder="Anotaciones..." oninput="schedNotas('+d+')">'+(reg.notas||'')+'</textarea>'+
      '<div class="si" id="si-'+d+'"></div></div>';

    // BOTON CUADRE (solo admin)
    if(!ro){
      html+='<div class="cuadre-form-wrap">'+
        '<div class="cuadre-form-inner" id="cf-'+d+'">'+
        '<div style="font-size:.72rem;color:var(--green);font-weight:800;margin-bottom:4px">&#x1F91D; Registrar Cuadre de Caja</div>'+
        '<input class="nef-inp" type="text" placeholder="Recibido por (nombre del jefe)" id="cf-recep-'+d+'">'+
        '<input class="nef-inp" type="text" placeholder="Observaciones (opcional)" id="cf-obs-'+d+'">'+
        '<button class="btn-hacer-cuadre" onclick="hacerCuadre('+d+')">&#x2705; Confirmar Cuadre</button>'+
        '</div>'+
        '<button class="btn-cuadre" onclick="togCF('+d+')" id="bcf-'+d+'">&#x1F91D; '+(cuadre?'Ver Cuadre':'Registrar Cuadre')+'</button>'+
        '</div>';
    }
    html+='</div>';
    card.innerHTML=html;
    list.appendChild(card);

    // BANNER CUADRE debajo del dia
    if(cuadre){
      // calcular total del ciclo
      const cicloStart=lastCuadre?lastCuadre:'01';
      const cicloStartNum=lastCuadre?parseInt(lastCuadre)+1:1;
      let cicloTotal=0;
      for(let dd=cicloStartNum;dd<=d;dd++){
        const dds=dateStr(dd);
        const ee=entMap[dds]||{am:[],pm:[]};
        cicloTotal+=[].concat(ee.am,ee.pm).reduce(function(s,en){return s+(en.monto||0);},0);
      }
      const banner=document.createElement('div');
      banner.className='cuadre-banner';
      banner.innerHTML='<div class="cuadre-left">'+
        '<div class="cuadre-icon">&#x1F91D;</div>'+
        '<div class="cuadre-title">CUADRE REALIZADO</div>'+
        '<div class="cuadre-range">Del '+(lastCuadre?lastCuadre+' al '+d:1+' al '+d)+' de '+MESES[curMonth]+'</div>'+
        '<div class="cuadre-meta">Recibio: '+(cuadre.receptor||'--')+' &bull; '+(cuadre.observaciones||'')+'</div>'+
        '</div>'+
        '<div>'+
        '<div class="cuadre-amount-lbl">Total ciclo</div>'+
        '<div class="cuadre-amount">'+fmt(cicloTotal)+'</div>'+
        (isAdmin()?'<button class="btn-del-cuadre" onclick="delCuadre('+cuadre.id+')">&#x1F5D1;</button>':'')+
        '</div>';
      list.appendChild(banner);
      lastCuadre=d;
    }

    if(isToday)setTimeout(function(){togDia(d);},100);
  }
}

function togDia(d){
  const b=document.getElementById('diab-'+d),c=document.getElementById('chev-'+d);
  if(b)b.classList.toggle('open');if(c)c.classList.toggle('open');
}
function togNef(d,t){const el=document.getElementById('nef-'+d+'-'+t);if(el)el.classList.toggle('open');}
function togCF(d){document.getElementById('cf-'+d).classList.toggle('open');}

async function addEntrega(d,turno){
  const monto=parseFloat(document.getElementById('nef-m-'+d+'-'+turno).value);
  const hora=document.getElementById('nef-h-'+d+'-'+turno).value;
  const receptor=(document.getElementById('nef-r-'+d+'-'+turno).value||'').trim();
  if(!monto||monto<=0){alert('Ingresa un monto valido.');return;}
  setSyncing();
  const {error}=await sbClient.from('caja_entregas').insert({punto:PUNTOS[curPunto],fecha:dateStr(d),turno:turno,hora:hora,monto:monto,receptor:receptor});
  if(error){setSyncErr();alert('Error: '+error.message);return;}
  setSyncOk();
  document.getElementById('nef-m-'+d+'-'+turno).value='';
  document.getElementById('nef-r-'+d+'-'+turno).value='';
  document.getElementById('nef-h-'+d+'-'+turno).value=nowTime();
  await renderCaja();
}
async function delEntrega(id,d,turno){
  if(!confirm('Eliminar esta entrega?'))return;
  setSyncing();await sbClient.from('caja_entregas').delete().eq('id',id);setSyncOk();await renderCaja();
}

async function hacerCuadre(d){
  const receptor=(document.getElementById('cf-recep-'+d).value||'').trim();
  const obs=(document.getElementById('cf-obs-'+d).value||'').trim();
  if(!receptor){alert('Ingresa quien recibio el dinero.');return;}
  if(!confirm('Confirmar cuadre del dia '+d+' de '+MESES[curMonth]+'?'))return;
  setSyncing();
  const {error}=await sbClient.from('caja_cuadres').upsert({punto:PUNTOS[curPunto],fecha:dateStr(d),receptor:receptor,observaciones:obs},{onConflict:'punto,fecha'});
  if(error){setSyncErr();alert('Error: '+error.message);return;}
  setSyncOk();await renderCaja();
}
async function delCuadre(id){
  if(!confirm('Eliminar este cuadre?'))return;
  setSyncing();await sbClient.from('caja_cuadres').delete().eq('id',id);setSyncOk();await renderCaja();
}

const NT={};
function schedNotas(d){
  clearTimeout(NT[d]);
  const si=document.getElementById('si-'+d);if(si){si.className='si saving';si.textContent='Guardando...';}
  NT[d]=setTimeout(function(){saveNotas(d);},1000);
}
async function saveNotas(d){
  setSyncing();
  const notas=(document.getElementById('notas-'+d)||{}).value||'';
  const {error}=await sbClient.from('caja_registros').upsert({punto:PUNTOS[curPunto],fecha:dateStr(d),notas:notas},{onConflict:'punto,fecha'});
  const si=document.getElementById('si-'+d);
  if(error){if(si){si.className='si err';si.textContent='Error';}setSyncErr();}
  else{if(si){si.className='si saved';si.textContent='Guardado';}setSyncOk();setTimeout(function(){if(si){si.className='si';si.textContent='';}},2000);}
}

function tomarFoto(){document.getElementById('g-cam').click();}
function selImg(input){
  const wrap=document.getElementById('g-prev'),img=document.getElementById('g-prev-img');
  if(input.files&&input.files[0]){
    // comprimir imagen antes de guardar
    const reader=new FileReader();
    reader.onload=function(e){
      const image=new Image();
      image.onload=function(){
        const canvas=document.createElement('canvas');
        const MAX=800;
        let w=image.width,h=image.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(image,0,0,w,h);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        img.src=compressed;wrap.style.display='block';
        img.dataset.b64=compressed;
      };
      image.src=e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }else wrap.style.display='none';
}

  const img64=document.getElementById('g-prev-img').dataset.b64||null;
  setSyncing();
  const {error}=await sbClient.from('caja_gastos').insert({fecha:fecha,monto:monto,descripcion:desc,img_base64:img64});
  if(error){setSyncErr();alert('Error: '+error.message);return;}
  setSyncOk();
  ['g-fecha','g-monto','g-desc'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('g-img').value='';document.getElementById('g-cam').value='';
  document.getElementById('g-prev').style.display='none';
  document.getElementById('g-prev-img').dataset.b64='';
  renderGastos();
}
async function deleteGasto(id){if(!confirm('Eliminar?'))return;setSyncing();await sbClient.from('caja_gastos').delete().eq('id',id);setSyncOk();renderGastos();}
async function renderGastos(){
  document.getElementById('gastos-form-wrap').style.display=isAdmin()?'block':'none';
  const list=document.getElementById('gastos-list');
  list.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const s=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-01';
  const e=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-31';
  const {data}=await sbClient.from('caja_gastos').select('*').gte('fecha',s).lte('fecha',e).order('fecha');

      :'<div class="ic-icon">&#x1F9FE;</div>')+
      '<div class="ic-info"><div class="ic-title">'+g.descripcion+'</div><div class="ic-meta">'+g.fecha+'</div></div>'+
      '<div class="ic-amt">-'+fmt(g.monto)+'</div>'+
      (isAdmin()?'<button class="btn-del" onclick="deleteGasto('+g.id+')">&#x2715;</button>':'');
    list.appendChild(div);
  });
}

async function saveUsuario(){
  const nombre=(document.getElementById('u-nombre').value||'').trim();
  const username=(document.getElementById('u-username').value||'').trim().toLowerCase();
  const pass=document.getElementById('u-pass').value;
  const rol=document.getElementById('u-rol').value;
  if(!nombre||!username||!pass){alert('Completa todos los campos.');return;}
  const hash=await sha256(pass);setSyncing();
  const {error}=await sbClient.from('app_usuarios').upsert({username:username,password:hash,rol:rol,nombre:nombre,activo:true},{onConflict:'username'});
  if(error){setSyncErr();alert('Error: '+error.message);return;}
  setSyncOk();['u-nombre','u-username','u-pass'].forEach(function(id){document.getElementById(id).value='';});
  renderUsuarios();
}
async function toggleUser(id,activo){await sbClient.from('app_usuarios').update({activo:!activo}).eq('id',id);renderUsuarios();}
async function renderUsuarios(){
  const list=document.getElementById('user-list');if(!list)return;
  list.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const {data}=await sbClient.from('app_usuarios').select('id,username,nombre,rol,activo').order('rol');
  if(!data||!data.length){list.innerHTML='<div class="empty-msg">// Sin usuarios.</div>';return;}
  list.innerHTML='';
  data.forEach(function(u){
    const div=document.createElement('div');div.className='item-card uc';
    div.innerHTML='<span class="rbadge '+u.rol+'">'+u.rol+'</span>'+
      '<div class="ic-info"><div class="ic-title">'+(u.nombre||u.username)+'</div><div class="ic-meta">@'+u.username+(u.activo?'':' - inactivo')+'</div></div>'+
      '<button class="btn-tog" onclick="toggleUser('+u.id+','+u.activo+')">'+(u.activo?'Desactivar':'Activar')+'</button>';
    list.appendChild(div);
  });
}

async function renderResumen(){
  document.getElementById('stat-grid').innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const s=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-01';
  const e=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-31';
  const [r1,r2,r3]=await Promise.all([
    sbClient.from('caja_entregas').select('punto,monto').gte('fecha',s).lte('fecha',e),
    sbClient.from('caja_gastos').select('monto').gte('fecha',s).lte('fecha',e),
    sbClient.from('caja_cuadres').select('*').gte('fecha',s).lte('fecha',e).order('fecha')
  ]);
  const pvT={};PUNTOS.forEach(function(p){pvT[p]=0;});
  (r1.data||[]).forEach(function(e){if(pvT[e.punto]!==undefined)pvT[e.punto]+=e.monto||0;});
  const ti=Object.values(pvT).reduce(function(s,v){return s+v;},0);
  const tg=(r2.data||[]).reduce(function(s,g){return s+g.monto;},0);
  const neto=ti-tg;
  document.getElementById('stat-grid').innerHTML=
    '<div class="stat-card"><div class="sc-label">Ingresos</div><div class="sc-val green">'+fmt(ti)+'</div></div>'+
    '<div class="stat-card"><div class="sc-label">Gastos</div><div class="sc-val red">'+fmt(tg)+'</div></div>'+
    '<div class="stat-card" style="grid-column:1/-1"><div class="sc-label">Neto del Mes</div><div class="sc-val '+(neto>=0?'gold':'red')+'" style="font-size:1.6rem">'+fmt(neto)+'</div></div>'+
    PUNTOS.map(function(p,i){return '<div class="stat-card"><div class="sc-label" style="color:'+PCOLORS[i]+'">'+p+'</div><div class="sc-val amber">'+fmt(pvT[p])+'</div></div>';}).join('');

  // Ciclos de cuadre
  const ciclosList=document.getElementById('ciclos-list');
  const cuadres=r3.data||[];
  if(!cuadres.length){
    ciclosList.innerHTML='<div class="empty-msg">// Sin cuadres registrados este mes.</div>';
  }else{
    ciclosList.innerHTML='';
    let prevDay=0;let cicloNum=1;
    cuadres.forEach(function(c){
      const cDay=parseInt(c.fecha.split('-')[2]);
      const div=document.createElement('div');div.className='ciclo-card';
      div.innerHTML='<div class="ciclo-num">Ciclo '+cicloNum+'</div>'+
        '<div class="ciclo-range">Del '+(prevDay+1)+' al '+cDay+' de '+MESES[curMonth]+'</div>'+
        '<div class="ciclo-meta">Entregado a: '+(c.receptor||'--')+(c.observaciones?' &bull; '+c.observaciones:'')+'</div>';
      ciclosList.appendChild(div);
      prevDay=cDay;cicloNum++;
    });
    if(prevDay<getDays()){
      const div=document.createElement('div');div.className='ciclo-card';
      div.style.borderColor='rgba(245,166,35,.3)';div.style.borderLeftColor='var(--accent)';
      div.innerHTML='<div class="ciclo-num" style="color:var(--accent)">Ciclo '+cicloNum+' (en curso)</div>'+
        '<div class="ciclo-range">Del '+(prevDay+1)+' al '+getDays()+' de '+MESES[curMonth]+'</div>'+
        '<div class="ciclo-meta" style="color:var(--accent)">Pendiente de cuadre</div>';
      ciclosList.appendChild(div);
    }
  }

  const rows=PUNTOS.map(function(p,i){return '<tr><td style="color:'+PCOLORS[i]+'">'+p+'</td><td class="pos">'+fmt(pvT[p])+'</td></tr>';}).join('');
  document.getElementById('res-table').innerHTML='<table class="res-table"><thead><tr><th>Punto</th><th>Total</th></tr></thead><tbody>'+rows+
    '<tr class="tr-row"><td>TOTAL</td><td>'+fmt(ti)+'</td></tr>'+
    '<tr><td style="color:var(--red)">GASTOS</td><td class="neg">-'+fmt(tg)+'</td></tr>'+
    '<tr class="nr-row"><td>NETO</td><td class="'+(neto>=0?'pos':'neg')+'">'+fmt(neto)+'</td></tr></tbody></table>';
  await renderHistory();
}

async function renderHistory(){
  const histEl=document.getElementById('hist-list');
  const {data}=await sbClient.from('caja_entregas').select('fecha,monto').order('fecha');
  if(!data||!data.length){histEl.innerHTML='<div class="empty-msg">// Sin historial aun.</div>';return;}
  const months={};data.forEach(function(r){const ym=r.fecha.slice(0,7);if(!months[ym])months[ym]=0;months[ym]+=r.monto||0;});
  histEl.innerHTML='';
  Object.keys(months).sort().reverse().forEach(function(ym){
    const p=ym.split('-'),label=MESES[parseInt(p[1])-1]+' '+p[0];
    const div=document.createElement('div');div.className='mhc';
    div.innerHTML='<div class="mhc-hd" onclick="this.nextElementSibling.classList.toggle('open')"><div class="mhc-m">'+label+'</div><div class="mhc-t">'+fmt(months[ym])+'</div></div>'+
      '<div class="mhc-body"><span style="font-size:.76rem;color:var(--text2);font-family:var(--mono)">Total: '+fmt(months[ym])+'</span>'+
      '<button style="margin-left:10px;background:none;border:1px solid var(--border);color:var(--accent);border-radius:5px;padding:3px 9px;font-size:.7rem;cursor:pointer" onclick="jumpTo(''+ym+'')">Ir</button></div>';
    histEl.appendChild(div);
  });
}
function jumpTo(ym){const p=ym.split('-');curYear=parseInt(p[0]);curMonth=parseInt(p[1])-1;updateML();showScreen('caja');}

async function exportTXT(){
  const s=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-01';
  const e=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-31';
  const [r1,r2]=await Promise.all([
    sbClient.from('caja_entregas').select('*').gte('fecha',s).lte('fecha',e).order('fecha'),
    sbClient.from('caja_gastos').select('*').gte('fecha',s).lte('fecha',e).order('fecha')
  ]);
  const pvT={};PUNTOS.forEach(function(p){pvT[p]=0;});
  (r1.data||[]).forEach(function(e){if(pvT[e.punto]!==undefined)pvT[e.punto]+=e.monto||0;});
  const ti=Object.values(pvT).reduce(function(s,v){return s+v;},0);
  const tg=(r2.data||[]).reduce(function(s,g){return s+g.monto;},0);
  let txt='LA VACA ORIGINAL
REPORTE DE CAJA - '+MESES[curMonth].toUpperCase()+' '+curYear+'
'+'='.repeat(50)+'

';
  PUNTOS.forEach(function(p){txt+=p.padEnd(14)+' '+fmt(pvT[p]).padStart(14)+'
';});
  txt+='-'.repeat(30)+'
Total Ingresos: '+fmt(ti)+'
Total Gastos:   -'+fmt(tg)+'
NETO:           '+fmt(ti-tg)+'
';
  if(r2.data&&r2.data.length){txt+='
GASTOS:
';r2.data.forEach(function(g){txt+=g.fecha+'  '+(g.descripcion||'').padEnd(30)+' -'+fmt(g.monto)+'
';});}
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='LVO_'+MESES[curMonth]+'_'+curYear+'.txt';a.click();
}

function openModal(src){document.getElementById('modal-img').src=src;document.getElementById('modal-ov').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-ov')||e.target.classList.contains('modal-close'))document.getElementById('modal-ov').classList.remove('open');}

function initApp(){
  const hUser=document.getElementById('h-user');hUser.style.display='flex';
  document.getElementById('h-av').textContent=sesion.nombre.charAt(0).toUpperCase();
  document.getElementById('h-av').className='h-av '+sesion.rol;
  document.getElementById('h-uname').textContent=sesion.nombre.split(' ')[0];
  if(!isAdmin())document.getElementById('ro-banner').classList.add('show');
  if(isAdmin())document.getElementById('bnav-usuarios').style.display='flex';
  document.getElementById('bottom-nav').style.display='flex';
  curYear=HOY.getFullYear();curMonth=HOY.getMonth();
  updateML();renderCaja();
  const td=HOY.getFullYear()+'-'+String(HOY.getMonth()+1).padStart(2,'0')+'-'+String(HOY.getDate()).padStart(2,'0');
  const gf=document.getElementById('g-fecha');if(gf)gf.value=td;
}

initSB();
const saved=localStorage.getItem('sesion');
if(saved){try{sesion=JSON.parse(saved);}catch(e){}}
if(sesion){document.getElementById('login-screen').classList.add('hidden');initApp();}
</script>
